# GENERATED FILE - Do not edit manually
name: test
'on':
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Enable Yarn
        run: |
          corepack enable &&
          corepack install # use the in-repo yarn version
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: 'yarn'
      - name: Set Timezone
        uses: MathRobin/timezone-action@v1.1
        with:
          timezoneLinux: Europe/Paris
      - name: System info
        run: |
          echo "node"
          node -v
          echo "npm"
          npm -v
          echo "yarn"
          yarn -v
          echo "yarn enableImmutableInstalls"
          yarn config get enableImmutableInstalls
      - name: Install modules
        run: yarn install
      - name: Run lint task
        run: yarn lint
      - name: Run tests
        run: yarn test
      - name: Build
        run: yarn build
      - name: Publish
        run: yarn npm publish
